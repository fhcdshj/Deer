<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deer | المتجر الفاخر</title>
    <style>
        /* استيراد خطوط فاخرة */
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&family=Cinzel:wght@500;700&display=swap');

        :root {
            --bg-color: #0b0b0b;
            --card-bg: #121212;
            --gold: #d4af37;
            --gold-hover: #f3e5ab;
            --text-color: #ffffff;
            --text-muted: #a0a0a0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow-x: hidden;
        }

        /* الهيدر / شريط التنقل */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 8%;
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
            background: linear-gradient(to bottom, #000, transparent);
        }

        .logo {
            font-family: 'Cinzel', serif;
            font-size: 2rem;
            font-weight: 700;
            color: var(--gold);
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.3);
        }

        .dev-btn {
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 8px 20px;
            font-size: 0.9rem;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.4s ease;
        }

        .dev-btn:hover {
            background: var(--gold);
            color: var(--bg-color);
            box-shadow: 0 0 15px var(--gold);
            font-weight: bold;
        }

        /* القسم الرئيسي البانر */
        .hero {
            text-align: center;
            padding: 60px 20px;
            background: radial-gradient(circle, rgba(40,40,40,0.3) 0%, rgba(11,11,11,1) 70%);
        }

        .hero h1 {
            font-family: 'Cinzel', serif;
            font-size: 3rem;
            color: #fff;
            margin-bottom: 10px;
        }

        .hero p {
            color: var(--text-muted);
            font-size: 1.1rem;
            letter-spacing: 1px;
        }

        .gold-line {
            width: 80px;
            height: 2px;
            background: var(--gold);
            margin: 20px auto;
        }

        /* شبكة المنتجات */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
        }

        /* بطاقة المنتج الفاخرة */
        .product-card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            overflow: hidden;
            transition: all 0.4s ease;
            position: relative;
        }

        .product-card:hover {
            transform: translateY(-10px);
            border-color: var(--gold);
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.1);
        }

        .product-img {
            width: 100%;
            height: 320px;
            object-fit: cover;
            filter: brightness(0.9);
            transition: filter 0.4s ease;
        }

        .product-card:hover .product-img {
            filter: brightness(1.05);
        }

        .product-info {
            padding: 20px;
            text-align: center;
        }

        .product-title {
            font-size: 1.2rem;
            margin-bottom: 10px;
            font-weight: 400;
            letter-spacing: 0.5px;
        }

        .product-price {
            color: var(--gold);
            font-size: 1.1rem;
            font-weight: 700;
        }

        /* لوحة التحكم المخفية للمطور */
        .dev-panel {
            display: none;
            background: #161616;
            border: 1px solid var(--gold);
            max-width: 500px;
            margin: 30px auto;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(0,0,0,0.7);
        }

        .dev-panel h2 {
            color: var(--gold);
            margin-bottom: 20px;
            text-align: center;
            font-size: 1.4rem;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .form-group input {
            width: 100%;
            padding: 10px;
            background: #222;
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            border-radius: 4px;
            outline: none;
            transition: border 0.3s;
        }

        .form-group input:focus {
            border-color: var(--gold);
        }

        .submit-btn {
            width: 100%;
            background: var(--gold);
            color: var(--bg-color);
            border: none;
            padding: 12px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            transition: background 0.3s;
        }

        .submit-btn:hover {
            background: var(--gold-hover);
        }

        .logout-btn {
            background: #bd2130;
            color: white;
            border: none;
            padding: 5px 10px;
            margin-top: 10px;
            cursor: pointer;
            border-radius: 4px;
            float: left;
        }

        /* فوتر */
        footer {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
            font-size: 0.8rem;
            border-top: 1px solid rgba(255,255,255,0.05);
            font-family: 'Cinzel', serif;
        }
    </style>
</head>
<body>

    <!-- الهيدر -->
    <header>
        <div class="logo">DEER</div>
        <button class="dev-btn" id="devBtn" onclick="checkPassword()">المطور</button>
    </header>

    <!-- البانر الترحيبي -->
    <section class="hero">
        <h1>DEER COLLECTION</h1>
        <p>عالم من الفخامة والتميز ينبض بين يديك</p>
        <div class="gold-line"></div>
    </section>

    <!-- لوحة المطور (تظهر بعد كلمة السر الصحيحة) -->
    <section class="dev-panel" id="devPanel">
        <h2>لوحة تحكم المطور لإضافة منتج</h2>
        <div class="form-group">
            <label>اسم المنتج</label>
            <input type="text" id="prodName" placeholder="مثال: ساعة دير الملكية">
        </div>
        <div class="form-group">
            <label>سعر المنتج</label>
            <input type="text" id="prodPrice" placeholder="مثال: $450">
        </div>
        <div class="form-group">
            <label>رابط صورة المنتج</label>
            <input type="text" id="prodImg" placeholder="أدخل رابط الصورة هنا">
        </div>
        <button class="submit-btn" onclick="addNewProduct()">نشر المنتج في الرئيسية</button>
        <button class="logout-btn" onclick="logoutDev()">خروج</button>
    </section>

    <!-- عرض المنتجات -->
    <main class="container">
        <div class="products-grid" id="productsGrid">
            <!-- المنتجات الافتراضية الفخمة -->
            <div class="product-card">
                <img src="https://images.unsplash.com/photo-1522335789203-aabd1fc54bc9?q=80&w=500" alt="منتج" class="product-img">
                <div class="product-info">
                    <div class="product-title">عطر DEER الأسود الفاخر</div>
                    <div class="product-price">$120</div>
                </div>
            </div>
            <div class="product-card">
                <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?q=80&w=500" alt="منتج" class="product-img">
                <div class="product-info">
                    <div class="product-title">ساعة دير الكلاسيكية الذهبية</div>
                    <div class="product-price">$350</div>
                </div>
            </div>
        </div>
    </main>

    <!-- الفوتر -->
    <footer>
        &copy; 2026 DEER LUXURY STORE. ALL RIGHTS RESERVED.
    </footer>

    <script>
        // المنتجات الافتراضية في حال كانت الذاكرة فارغة
        const defaultProducts = [
            { name: "عطر DEER الأسود الفاخر", price: "$120", img: "https://images.unsplash.com/photo-1522335789203-aabd1fc54bc9?q=80&w=500" },
            { name: "ساعة دير الكلاسيكية الذهبية", price: "$350", img: "https://images.unsplash.com/photo-1523275335684-37898b6baf30?q=80&w=500" }
        ];

        // تحميل المنتجات عند فتح الموقع
        window.onload = function() {
            if (!localStorage.getItem('deer_products')) {
                localStorage.setItem('deer_products', JSON.stringify(defaultProducts));
            }
            displayProducts();
        };

        // دالة التحقق من كلمة السر للمطور
        function checkPassword() {
            let password = prompt("أدخل كلمة سر المطور لدخول لوحة التحكم:");
            
            // تم تحديث كلمة السر إلى الخيار الجديد تماماً
            if (password === "Deer123456@") {
                alert("تم التحقق بنجاح! مرحبًا بك أيها المطور.");
                document.getElementById('devPanel').style.display = 'block';
                document.getElementById('devPanel').scrollIntoView({ behavior: 'smooth' });
            } else if (password !== null) {
                alert("كلمة السر خاطئة! حاول مجددًا.");
            }
        }

        // دالة إضافة منتج جديد
        function addNewProduct() {
            let name = document.getElementById('prodName').value;
            let price = document.getElementById('prodPrice').value;
            let img = document.getElementById('prodImg').value;

            if (name === "" || price === "" || img === "") {
                alert("الرجاء ملء جميع الحقول (الاسم، السعر، رابط الصورة).");
                return;
            }

            let products = JSON.parse(localStorage.getItem('deer_products'));
            products.unshift({ name: name, price: price, img: img });
            localStorage.setItem('deer_products', JSON.stringify(products));

            displayProducts();

            document.getElementById('prodName').value = "";
            document.getElementById('prodPrice').value = "";
            document.getElementById('prodImg').value = "";

            alert("تمت إضافة المنتج بنجاح، وظهر الآن لكل الأعضاء في الصفحة الرئيسية!");
        }

        // دالة عرض المنتجات في الشبكة
        function displayProducts() {
            let products = JSON.parse(localStorage.getItem('deer_products')) || defaultProducts;
            let grid = document.getElementById('productsGrid');
            grid.innerHTML = ""; 

            products.forEach(product => {
                grid.innerHTML += `
                    <div class="product-card">
                        <img src="${product.img}" alt="${product.name}" class="product-img" onerror="this.src='https://via.placeholder.com/500x500/121212/d4af37?text=DEER+PREMIUM'">
                        <div class="product-info">
                            <div class="product-title">${product.name}</div>
                            <div class="product-price">${product.price}</div>
                        </div>
                    </div>
                `;
            });
        }

        // دالة الخروج من لوحة المطور
        function logoutDev() {
            document.getElementById('devPanel').style.display = 'none';
        }
    </script>
</body>
</html>
